<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chip Resolution — Live</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="page">

    <header>
      <div class="header-left">
        <h1>AI Chip Resolution</h1>
        <span id="run-id" class="pill">--</span>
      </div>
      <div class="header-center">
        <div class="progress-track">
          <div class="progress-fill" id="progress-bar"></div>
        </div>
        <span class="progress-label" id="progress-label">0 / 0</span>
      </div>
      <div class="header-right">
        <span id="args-summary" class="args-summary">—</span>
        <span id="elapsed" class="elapsed">0.0s</span>
      </div>
    </header>

    <div class="pipeline-wrap">
      <div class="pipeline" id="pipeline">
        <div class="particle" id="particle"></div>
        <!-- Stage cards injected here -->
      </div>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Latest Resolution</span>
          <span id="resolved-count" class="panel-sub">0 resolved</span>
        </div>
        <div class="latest-resolution" id="latest-resolution">
          <div class="lr-empty">Waiting for first model…</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Recent Results</span>
        </div>
        <div class="recent-list" id="recent-list">
          <div class="lr-empty">No results yet.</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Summary</span>
        </div>
        <div class="summary-grid">
          <div class="sg-block">
            <div class="sg-label">By chip provider</div>
            <div id="summary-chip" class="sg-list"></div>
          </div>
          <div class="sg-block">
            <div class="sg-label">By resolution source</div>
            <div id="summary-source" class="sg-list"></div>
          </div>
          <div class="sg-block">
            <div class="sg-label">LLM fallback</div>
            <div class="sg-single">
              <span class="sg-val" id="llm-calls">0</span>
              <span class="sg-suffix">calls</span>
              <span class="sg-sep">·</span>
              <span class="sg-val" id="llm-cost">$0.00</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>

</html>
